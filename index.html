<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmadeal - 全球医药交易概览</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav id="navbar">
        <div class="logo">PHARMADEAL</div>
        <ul class="nav-links">
            <li><a href="#home">首页</a></li>
            <li><a href="#overview">全球交易概览</a></li>
            <li><a href="#reports">报告</a></li>
        </ul>
    </nav>

    <!-- 首页 -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>全球医药交易与报告平台</h1>
            <p>实时更新全球医药行业交易动态与企业报告。</p>
        </div>
    </section>

    <!-- 全球医药交易概览 -->
    <section id="overview" class="overview">
        <h2>全球医药交易概览</h2>
        <div class="transaction-list">
            <!-- 模拟交易数据 -->
            <div class="transaction-item">
                <h3>交易名称</h3>
                <p>交易金额：$0.0亿</p>
                <p>交易时间：2026-03-27</p>
            </div>
            <div class="transaction-item">
                <h3>交易名称</h3>
                <p>交易金额：$0.0亿</p>
                <p>交易时间：2026-03-27</p>
            </div>
        </div>
    </section>

    <!-- 报告列表 -->
    <section id="reports" class="reports">
        <h2>企业报告</h2>
        <div class="report-list">
            <!-- 报告链接 -->
            <a href="https://static.cninfo.com.cn/finalpage/2026-03-26/1225032585.PDF" target="_blank" class="report-link">恒瑞医药年度报告</a>
            <a href="https://example.com/report2.pdf" target="_blank" class="report-link">其他企业报告</a>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
