<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmadeal | 全球医疗产业资讯</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0d9488;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); }

        /* 顶部 */
        header { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 2rem; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 800; }

        /* 概览块 - 保证三格并排 */
        .insights-section { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }
        .insights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .insight-card { background: var(--white); border: 1px solid var(--border); padding: 1.2rem; border-radius: 12px; }
        .insight-label { font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 0.3rem; }
        .insight-value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

        /* 主体 - 左右分栏 */
        main { max-width: 1200px; margin: 0 auto; padding: 1rem; display: flex; gap: 2rem; }
        
        #left-content { flex: 2; min-width: 0; } /* 资讯区 */
        #right-sidebar { flex: 1; min-width: 300px; } /* 财报区 */

        @media (max-width: 850px) {
            main { flex-direction: column; }
            .insights-grid { grid-template-columns: 1fr; }
        }

        /* 资讯卡片样式 */
        .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-left: 0.5rem; border-left: 4px solid var(--accent); }
        .news-card { background: var(--white); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .news-title { color: var(--primary); text-decoration: none; font-weight: 600; display: block; margin-bottom: 0.5rem; font-size: 1.05rem; }
        .news-title:hover { color: var(--accent); }
        .news-date { font-size: 0.8rem; color: #94a3b8; }
        .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #f1f5f9; color: #475569; font-weight: 700; margin-right: 8px; }

        /* 财报列表样式 */
        .sidebar-inner { background: var(--white); border: 1px solid var(--border); padding: 1rem; border-radius: 12px; }
        .co-item { padding: 0.8rem 0; border-bottom: 1px solid #f1f5f9; }
        .co-name { font-size: 0.9rem; font-weight: 600; }
        .co-links { margin-top: 0.4rem; display: flex; gap: 5px; }
        .btn-link { font-size: 0.7rem; color: var(--accent); background: #f0fdfa; padding: 2px 6px; border-radius: 4px; text-decoration: none; border: 1px solid #ccfbf1; }

        .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">Pharmadeal</div>
        <div id="date-now" style="font-size: 0.8rem; color: #94a3b8;">Intelligence System</div>
    </div>
</header>

<div class="insights-section">
    <div class="insights-grid">
        <div class="insight-card">
            <div class="insight-label">Intelligence</div>
            <div class="insight-value" id="stat-count">--</div>
        </div>
        <div class="insight-card">
            <div class="insight-label">Focus</div>
            <div class="insight-value">Global R&D</div>
        </div>
        <div class="insight-card">
            <div class="insight-label">Market</div>
            <div class="insight-value">Active</div>
        </div>
    </div>
</div>

<main>
    <div id="left-content">
        <h2 class="section-title">全球资讯</h2>
        <div id="news-list">
            <div class="loading">正在同步全球医药数据库...</div>
        </div>
    </div>

    <div id="right-sidebar">
        <h2 class="section-title">药企财报</h2>
        <div class="sidebar-inner">
            <div id="report-list">
                <div class="co-item">
                    <div class="co-name">恒瑞医药 600276</div>
                    <div class="co-links"><a href="#" class="btn-link">2023年报</a></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    // 自动运行
    async function start() {
        try {
            const res = await fetch('data.json');
            const data = await res.json();
            
            // 更新计数
            document.getElementById('stat-count').innerText = data.length + " DEALS";
            document.getElementById('date-now').innerText = "Last Update: " + new Date().toLocaleDateString();

            // 渲染资讯
            const list = document.getElementById('news-list');
            if (data.length === 0) {
                list.innerHTML = '<div class="loading">今日暂无更新数据</div>';
                return;
            }

            list.innerHTML = data.map(item => `
                <div class="news-card">
                    <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                    <div>
                        <span class="tag">${item.title.includes('IPO') ? 'IPO' : 'NEWS'}</span>
                        <span class="news-date">${item.date || ''}</span>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            document.getElementById('news-list').innerHTML = '<div class="loading">⚠️ 数据库同步失败，请检查 data.json 文件</div>';
        }
    }

    start();
</script>

</body>
</html>
