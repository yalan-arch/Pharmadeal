<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球药企情报局 | Global Pharma Intel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav id="navbar">
        <div class="logo">PHARMA<span class="highlight">INTEL</span></div>
        <ul class="nav-links">
            <li><a href="#financing">融资</a></li>
            <li><a href="#bd">BD交易</a></li>
            <li><a href="#ipo">IPO</a></li>
        </ul>
    </nav>

    <!-- 头部区域 -->
    <header class="hero">
        <div class="hero-content">
            <h1>全球上市药企情报中心</h1>
            <p>实时监控全球医药市场动态，聚焦上市药企交易与融资</p>
        </div>
    </header>

    <!-- 全球交易概览区域 -->
    <section id="global-overview" class="global-overview">
        <div class="container">
            <h2>全球医药交易概览</h2>
            <div id="transaction-list" class="transaction-list">
                <!-- 交易数据将通过JavaScript动态插入到这里 -->
            </div>
        </div>
    </section>

    <!-- 报表区域 -->
    <section id="reports" class="reports">
        <div class="container">
            <h2>企业报表中心</h2>
            <div id="report-list" class="report-list">
                <!-- 报表链接将通过JavaScript动态插入到这里 -->
            </div>
        </div>
    </section>

    <!-- PDF预览区域 -->
    <section id="pdf-viewer" class="pdf-viewer">
        <div class="container">
            <h2>PDF报告预览</h2>
            <iframe id="pdf-iframe" src="" frameborder="0"></iframe>
        </div>
    </section>

    <!-- 引入JavaScript文件 -->
    <script src="script.js"></script>
</body>
</html>
